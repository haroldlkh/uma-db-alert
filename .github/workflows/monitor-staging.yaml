name: UMA Monitor (Staging)
    
permissions:
  actions: write   # allow deleting old caches
  contents: read
  
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check to run without sending alerts"
        type: boolean
        required: false
        default: "false"
      reset_state:
        type: boolean
        default: false
      debug_artifacts:
        description: "Upload Playwright debug artifacts"
        type: boolean
        default: false

jobs:
  staging:
    uses: ./.github/workflows/run-monitor.yaml
    with:
      dry_run: ${{ inputs.dry_run }}
      reset_state: ${{ inputs.reset_state }}
      environment_name: "Staging"
      outputs_profiles: "discord_forum"   # or "discord_forum,discord_text" later
      debug_artifacts: ${{ inputs.debug_artifacts }}
    secrets:
      CALLER_DISCORD_WEBHOOK_FORUM: ${{ secrets.ENV_DISCORD_WEBHOOK }}
